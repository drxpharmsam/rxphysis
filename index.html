<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RxPhysis — Super Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-pills"></i></div>
      <div class="brand-text">
        <span class="brand-name">RxPhysis</span>
        <span class="brand-tag">Super Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <a class="nav-item" data-section="dashboard" onclick="navigate('dashboard')">
        <i class="fas fa-gauge-high"></i><span>Dashboard</span>
      </a>
      <a class="nav-item" data-section="finance" onclick="navigate('finance')">
        <i class="fas fa-indian-rupee-sign"></i><span>Finance &amp; Escrow</span>
      </a>
      <a class="nav-item" data-section="medicines" onclick="navigate('medicines')">
        <i class="fas fa-capsules"></i><span>Medicine Master</span>
      </a>
      <a class="nav-item" data-section="prescriptions" onclick="navigate('prescriptions')">
        <i class="fas fa-file-prescription"></i><span>Prescriptions</span>
      </a>
      <a class="nav-item" data-section="doctors" onclick="navigate('doctors')">
        <i class="fas fa-user-doctor"></i><span>Doctors</span>
      </a>
      <a class="nav-item" data-section="pharmacies" onclick="navigate('pharmacies')">
        <i class="fas fa-hospital"></i><span>Pharmacies</span>
      </a>
      <a class="nav-item" data-section="delivery" onclick="navigate('delivery')">
        <i class="fas fa-truck"></i><span>Delivery</span>
      </a>
      <a class="nav-item" data-section="nurses" onclick="navigate('nurses')">
        <i class="fas fa-user-nurse"></i><span>Nurses</span>
      </a>
      <a class="nav-item" data-section="risk" onclick="navigate('risk')">
        <i class="fas fa-triangle-exclamation"></i><span>Risk &amp; Safety</span>
      </a>
      <a class="nav-item" data-section="analytics" onclick="navigate('analytics')">
        <i class="fas fa-chart-line"></i><span>Analytics</span>
      </a>
      <a class="nav-item" data-section="inventory" onclick="navigate('inventory')">
        <i class="fas fa-boxes-stacked"></i><span>Inventory</span>
      </a>
      <a class="nav-item" data-section="roles" onclick="navigate('roles')">
        <i class="fas fa-shield-halved"></i><span>Roles &amp; Permissions</span>
      </a>
      <a class="nav-item" data-section="notifications" onclick="navigate('notifications')">
        <i class="fas fa-bell"></i><span>Notifications</span>
        <span class="nav-badge" id="navNotifBadge"></span>
      </a>
      <a class="nav-item" data-section="documents" onclick="navigate('documents')">
        <i class="fas fa-folder-open"></i><span>Documents</span>
      </a>
      <a class="nav-item" data-section="incidents" onclick="navigate('incidents')">
        <i class="fas fa-circle-exclamation"></i><span>Incidents</span>
        <span class="nav-badge" id="navIncidentBadge"></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="reset-demo-btn" onclick="resetDemoData()">
        <i class="fas fa-arrows-rotate"></i>
        <span>Reset Demo Data</span>
      </button>
    </div>
  </aside>

  <!-- MAIN WRAP -->
  <div id="mainWrap">

    <!-- TOPBAR -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div class="topbar-breadcrumb">
          <span id="topbarTitle">Dashboard</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <i class="fas fa-magnifying-glass"></i>
          <input type="text" placeholder="Quick search..." id="globalSearch" aria-label="Global search" oninput="handleGlobalSearch(this.value)">
        </div>
        <button class="tb-icon-btn" onclick="navigate('notifications')" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="notif-dot" id="notifDot" style="display:none"></span>
        </button>
        <button class="tb-icon-btn" onclick="showAuditLog()" title="Audit Log">
          <i class="fas fa-clock-rotate-left"></i>
        </button>
        <div class="admin-chip">
          <div class="admin-av">SA</div>
          <div class="admin-details">
            <div class="admin-name">Super Admin</div>
            <div class="admin-role">Full Access</div>
          </div>
        </div>
        <button class="tb-icon-btn tb-logout" onclick="showToast('Session management not configured', 'info')" title="Logout">
          <i class="fas fa-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <!-- CONTENT SECTIONS -->
    <main id="content">
      <div id="section-dashboard"      class="section"></div>
      <div id="section-finance"        class="section"></div>
      <div id="section-medicines"      class="section"></div>
      <div id="section-prescriptions"  class="section"></div>
      <div id="section-doctors"        class="section"></div>
      <div id="section-pharmacies"     class="section"></div>
      <div id="section-delivery"       class="section"></div>
      <div id="section-nurses"         class="section"></div>
      <div id="section-risk"           class="section"></div>
      <div id="section-analytics"      class="section"></div>
      <div id="section-inventory"      class="section"></div>
      <div id="section-roles"          class="section"></div>
      <div id="section-notifications"  class="section"></div>
      <div id="section-documents"      class="section"></div>
      <div id="section-incidents"      class="section"></div>
    </main>

  </div>
</div>

<!-- MODAL OVERLAY -->
<div id="modalOverlay" onclick="handleOverlayClick(event)">
  <div id="modalContainer">
    <div class="modal-hdr" id="modalHdr">
      <h3 id="modalTitle">Title</h3>
      <button class="modal-x" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-bdy" id="modalBody"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer"></div>

<script src="app.js"></script>
</body>
</html>
